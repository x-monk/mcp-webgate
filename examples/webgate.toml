# webgate.toml — full configuration reference
#
# Lookup order at startup: ./webgate.toml > ~/webgate.toml > defaults
# Env vars always override file values (WEBGATE_* prefix).
# Config is read once at startup; changes require a server restart.

[server]
max_download_mb     = 1.0    # hard cap on per-page raw download (streaming — never buffered)
max_result_length   = 4000   # hard char cap per result; also the summarizer output target
max_query_budget    = 16000  # total char budget distributed across all sources in a query
max_queries         = 5      # max parallel queries per query call
search_timeout      = 8.0    # HTTP timeout in seconds
oversampling_factor = 2      # candidate multiplier before dedup (2 = 2× results fetched from backend)
auto_recovery_fetch = false  # Round 2: replace failed fetches from oversampling reserve
max_total_results   = 20     # global cap on results returned per query call
blocked_domains     = []     # e.g. ["reddit.com", "pinterest.com"]
allowed_domains     = []     # if non-empty, only these domains are fetched
debug               = false  # emit structured log on every tool call
log_file            = ""     # log file path; empty = stderr when debug = true

[backends]
default = "searxng"          # active backend: searxng | brave | tavily | exa | serpapi

[backends.searxng]
url = "http://localhost:8080"

[backends.brave]
api_key   = ""               # Brave Search API key (https://brave.com/search/api/)
safesearch = 1               # 0=off 1=moderate 2=strict

[backends.tavily]
api_key      = ""            # Tavily API key (https://tavily.com/)
search_depth = "basic"       # "basic" or "advanced"

[backends.exa]
api_key       = ""           # Exa API key (https://exa.ai/)
num_sentences = 3            # sentences per snippet
type          = "neural"     # "neural" (semantic) or "keyword"

[backends.serpapi]
api_key = ""                 # SerpAPI key (https://serpapi.com/)
engine  = "google"           # google | bing | duckduckgo | yandex | yahoo
gl      = "us"               # country code for results (affects ranking)
hl      = "en"               # language code for results

[llm]
enabled  = false             # set to true to enable expansion, summarization, reranking
base_url = "http://localhost:11434/v1"   # any OpenAI-compatible endpoint
api_key  = ""                # empty for local models (Ollama, LM Studio, vLLM)
model    = "gemma3:27b"      # model name as accepted by the endpoint
timeout  = 15.0              # LLM request timeout in seconds

# Per-feature flags — all default true when llm.enabled = true
expansion_enabled      = true   # auto-expand single queries into N complementary variants
summarization_enabled  = true   # append a Markdown summary with citations to every query response
llm_rerank_enabled     = false  # LLM-assisted reranking (adds latency; BM25 always runs)
summarizer_input_limit = 32000  # chars of cleaned content fed to the summarizer per call
