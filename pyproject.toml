[project]
name = "mcp-xsearch"
version = "0.1.0"
description = "Denoised web search MCP server with context flooding protection"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Hannibal", email = "annibale.x@gmail.com" }]
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27",
    "lxml>=5.0",
    "pydantic>=2.0",
]

[project.scripts]
mcp-xsearch = "mcp_xsearch.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_xsearch"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]
