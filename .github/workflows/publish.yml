name: Publish

# Triggered manually by `robot.py publish` via `gh workflow run`.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest -v

      - name: Prepare README for PyPI
        run: python scripts/robot.py prep

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        run: uv run twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin mcp-publisher

      - name: Publish to MCP Registry
        run: |
          mcp-publisher login github
          mcp-publisher publish
        env:
          MCP_GITHUB_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
